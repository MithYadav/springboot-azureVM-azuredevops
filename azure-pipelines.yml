trigger:
  branches:
    include:
      - main
      - master
      - develop

pool:
  vmImage: 'ubuntu-latest'

variables:
  # Docker image configuration
  dockerRegistryServiceConnection: 'ACR-Connection'
  imageRepository: 'springboot-app'
  containerRegistry: 'myspringbootacr.azurecr.io'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'
  tag: '$(Build.BuildId)'
  
  # VM configuration
  vmIP: '20.220.217.203'
  vmUser: 'azureuser'
  sshServiceConnection: 'AzureVM-SSH'
  
  # Application configuration
  APP_NAME: 'spring-boot-app'
  CONTAINER_NAME: 'springboot-container'
  APP_PORT: '8080'

stages:
  #######################################
  # STAGE 1: BUILD & PUSH DOCKER IMAGE
  #######################################
  - stage: Build
    displayName: 'Build and Push Docker Image'
    jobs:
      - job: BuildAndPush
        displayName: 'Build Docker Image and Push to ACR'
        steps:
          # Checkout code
          - checkout: self

          # Build with Maven first (to create JAR)
          - task: Maven@3
            displayName: 'Maven Build'
            inputs:
              mavenPomFile: 'pom.xml'
              goals: 'clean package'
              options: '-DskipTests'
              publishJUnitResults: false
              javaHomeOption: 'JDKVersion'
              jdkVersionOption: '17'
              mavenVersionOption: 'Default'

          # Build Docker image
          - task: Docker@2
            displayName: 'Build Docker Image'
            inputs:
              command: 'build'
              repository: '$(imageRepository)'
              dockerfile: '$(dockerfilePath)'
              containerRegistry: '$(dockerRegistryServiceConnection)'
              tags: |
                $(tag)
                latest

          # Push Docker image to ACR
          - task: Docker@2
            displayName: 'Push Docker Image to ACR'
            inputs:
              command: 'push'
              repository: '$(imageRepository)'
              containerRegistry: '$(dockerRegistryServiceConnection)'
              tags: |
                $(tag)
                latest

          # Display image info
          - script: |
              echo "Docker image pushed successfully!"
              echo "Image: $(containerRegistry)/$(imageRepository):$(tag)"
              echo "Also tagged as: $(containerRegistry)/$(imageRepository):latest"
            displayName: 'Display Image Info'