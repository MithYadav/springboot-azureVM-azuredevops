trigger:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: 'ubuntu-latest'

variables:
  # ACR Configuration
  dockerRegistryServiceConnection: 'ACR-Connection'
  imageRepository: 'springboot-app-vm'
  containerRegistry: 'mithspringvmacr.azurecr.io'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'
  tag: '$(Build.BuildId)'

stages:
  - stage: BuildAndPush
    displayName: 'Build and Push Docker Image to ACR'
    jobs:
      - job: BuildJob
        displayName: 'Build Docker Image and Push to ACR'
        steps:
          # Step 1: Checkout code
          - checkout: self
            displayName: 'Checkout Source Code'

          # Step 2: Build Docker image (Maven build happens inside Docker)
          - task: Docker@2
            displayName: 'Build Docker Image (Multi-stage)'
            inputs:
              command: 'build'
              repository: '$(imageRepository)'
              dockerfile: '$(dockerfilePath)'
              containerRegistry: '$(dockerRegistryServiceConnection)'
              tags: |
                $(tag)
                latest
              arguments: '--no-cache'

          # Step 3: Push Docker image to ACR
          - task: Docker@2
            displayName: 'Push Docker Image to ACR'
            inputs:
              command: 'push'
              repository: '$(imageRepository)'
              containerRegistry: '$(dockerRegistryServiceConnection)'
              tags: |
                $(tag)
                latest

          # Step 4: Display success message
          - script: |
              echo "=========================================="
              echo "✅ Docker Image Built and Pushed Successfully!"
              echo "=========================================="
              echo "Image Details:"
              echo "  Registry: $(containerRegistry)"
              echo "  Repository: $(imageRepository)"
              echo "  Tags: $(tag), latest"
              echo ""
              echo "Full Image Names:"
              echo "  $(containerRegistry)/$(imageRepository):$(tag)"
              echo "  $(containerRegistry)/$(imageRepository):latest"
              echo "=========================================="
            displayName: 'Display Image Information'
