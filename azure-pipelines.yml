trigger:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: 'ubuntu-latest'

variables:
  # 1. Link your Azure DevOps Library Variable Group here
  - group: acr-secrets

  # 2. Define your local pipeline variables (REMOVED local ACR_USERNAME)
  - name: dockerRegistryServiceConnection
    value: 'ACR-Connection'
  - name: containerRegistry
    value: 'mithspringvmacr.azurecr.io'
  - name: imageRepository
    value: 'springboot-app-vm'
  - name: dockerfilePath
    value: '$(Build.SourcesDirectory)/Dockerfile'
  - name: tag
    value: '$(Build.BuildId)'

  # VM Configuration
  - name: sshServiceConnection
    value: 'azure-vm-ssh'
  - name: vmIP
    value: '20.220.217.203'

  # Container Configuration
  - name: CONTAINER_NAME
    value: 'springboot-container'
  - name: APP_PORT
    value: '8080'

stages:

#######################################
# STAGE 1: BUILD AND PUSH TO ACR
#######################################
- stage: BuildAndPush
  displayName: 'Build and Push Docker Image to ACR'
  jobs:
    - job: BuildJob
      displayName: 'Build Docker Image and Push to ACR'
      steps:
        - checkout: self
          displayName: 'Checkout Source Code'

        - task: Docker@2
          displayName: 'Build Docker Image'
          inputs:
            command: 'build'
            repository: '$(imageRepository)'
            dockerfile: '$(dockerfilePath)'
            containerRegistry: '$(dockerRegistryServiceConnection)'
            tags: |
              $(tag)
              latest
            arguments: '--no-cache'

        - task: Docker@2
          displayName: 'Push Docker Image to ACR'
          inputs:
            command: 'push'
            repository: '$(imageRepository)'
            containerRegistry: '$(dockerRegistryServiceConnection)'
            tags: |
              $(tag)
              latest

#######################################
# STAGE 2: DEPLOY TO AZURE VM
#######################################
- stage: Deploy
  displayName: 'Deploy to Azure VM'
  dependsOn: BuildAndPush
  condition: succeeded()
  jobs:
    - deployment: DeployToVM
      displayName: 'Deploy Container on Azure VM'
      environment: 'production-vm'
      strategy:
        runOnce:
          deploy:
            steps:
              - task: SSH@0
                displayName: 'Deploy Docker Container on VM'
                # CRUCIAL: Map BOTH secrets out of the library variable group into this environment block
                env:
                  REMOTE_ACR_USER: $(ACR_USERNAME)
                  REMOTE_ACR_PASS: $(ACR_PASSWORD)
                inputs:
                  sshEndpoint: '$(sshServiceConnection)'
                  runOptions: 'inline'
                  inline: |
                    echo "===================================="
                    echo "Starting Deployment"
                    echo "===================================="

                    # Login to ACR using the cleanly mapped pipeline environment flags
                    echo "Logging into Azure Container Registry..."
                    echo "$REMOTE_ACR_PASS" | docker login $(containerRegistry) \
                      -u "$REMOTE_ACR_USER" \
                      --password-stdin

                    # Stop Existing Container
                    echo "Stopping existing container..."
                    docker stop $(CONTAINER_NAME) || true
                    docker rm $(CONTAINER_NAME) || true

                    # Pull Latest Image
                    echo "Pulling target Docker image..."
                    docker pull $(containerRegistry)/$(imageRepository):$(tag)

                    # Run New Container
                    echo "Starting new container..."
                    docker run -d \
                      --name $(CONTAINER_NAME) \
                      --restart unless-stopped \
                      -p $(APP_PORT):8080 \
                      -e SPRING_PROFILES_ACTIVE=prod \
                      $(containerRegistry)/$(imageRepository):$(tag)

                    # Wait for app startup
                    echo "Waiting for application startup..."
                    sleep 15

                    # Check running containers
                    echo "===================================="
                    echo "Container Status"
                    echo "===================================="
                    docker ps -a

                    # Show logs
                    echo "===================================="
                    echo "Container Logs"
                    echo "===================================="
                    docker logs --tail 50 $(CONTAINER_NAME)

                    # Health Check
                    echo "===================================="
                    echo "Application Health Check"
                    echo "===================================="
                    curl -f http://localhost:8080/actuator/health || echo "Health endpoint unavailable"

                    # Cleanup old unused dangling images
                    echo "Cleaning old Docker images..."
                    docker image prune -af

                    echo "===================================="
                    echo "Deployment Completed Successfully"
                    echo "===================================="
                  readyTimeout: '20000'

              - script: |
                  echo "===================================="
                  echo "Application URL"
                  echo "===================================="
                  echo "http://$(vmIP):$(APP_PORT)"
                displayName: 'Display Application URL'
