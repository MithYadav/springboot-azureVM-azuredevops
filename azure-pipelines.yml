trigger:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: 'ubuntu-latest'

variables:
  # ACR Configuration
  dockerRegistryServiceConnection: 'ACR-Connection'
  imageRepository: 'springboot-app-vm'
  containerRegistry: 'mithspringvmacr.azurecr.io'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'
  tag: '$(Build.BuildId)'

stages:
  - stage: BuildAndPush
    displayName: 'Build and Push Docker Image to ACR'
    jobs:
      - job: BuildJob
        displayName: 'Build Spring Boot and Push to ACR'
        steps:
          # Step 1: Checkout code
          - checkout: self
            displayName: 'Checkout Source Code'

          # Step 2: Set up JDK 21
          - task: JavaToolInstaller@0
            displayName: 'Install JDK 21'
            inputs:
              versionSpec: '21'
              jdkArchitectureOption: 'x64'
              jdkSourceOption: 'PreInstalled'

          # Step 3: Build with Maven
          - task: Maven@3
            displayName: 'Maven Build (clean package)'
            inputs:
              mavenPomFile: 'pom.xml'
              goals: 'clean package'
              options: '-DskipTests'
              publishJUnitResults: false
              javaHomeOption: 'JDKVersion'
              jdkVersionOption: '21'
              mavenVersionOption: 'Default'

          # Step 4: List target directory (for debugging)
          - script: |
              echo "=== Listing target directory ==="
              ls -lh target/
              echo "=== JAR file details ==="
              ls -lh target/*.jar
            displayName: 'Show JAR file details'

          # Step 5: Build Docker image
          - task: Docker@2
            displayName: 'Build Docker Image'
            inputs:
              command: 'build'
              repository: '$(imageRepository)'
              dockerfile: '$(dockerfilePath)'
              containerRegistry: '$(dockerRegistryServiceConnection)'
              tags: |
                $(tag)
                latest

          # Step 6: Push Docker image to ACR
          - task: Docker@2
            displayName: 'Push Docker Image to ACR'
            inputs:
              command: 'push'
              repository: '$(imageRepository)'
              containerRegistry: '$(dockerRegistryServiceConnection)'
              tags: |
                $(tag)
                latest

          # Step 7: Display success message
          - script: |
              echo "=========================================="
              echo "✅ Docker Image Built and Pushed Successfully!"
              echo "=========================================="
              echo "Image Details:"
              echo "  Registry: $(containerRegistry)"
              echo "  Repository: $(imageRepository)"
              echo "  Tags: $(tag), latest"
              echo ""
              echo "Full Image Names:"
              echo "  $(containerRegistry)/$(imageRepository):$(tag)"
              echo "  $(containerRegistry)/$(imageRepository):latest"
              echo "=========================================="
            displayName: 'Display Image Information'
