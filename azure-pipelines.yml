trigger:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: 'ubuntu-latest'

variables:
  # ACR Configuration
  dockerRegistryServiceConnection: 'ACR-Connection'
  containerRegistry: 'mithspringvmacr.azurecr.io'
  imageRepository: 'springboot-app-vm'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'
  tag: '$(Build.BuildId)'

  # VM Configuration
  sshServiceConnection: 'azure-vm-ssh'
  vmIP: '20.220.217.203'

  # Container Configuration
  CONTAINER_NAME: 'springboot-container'
  APP_PORT: '8080'

  # ACR Username
  ACR_USERNAME: 'mithspringvmacr'

stages:

#######################################
# STAGE 1: BUILD AND PUSH TO ACR
#######################################
- stage: BuildAndPush
  displayName: 'Build and Push Docker Image to ACR'

  jobs:
    - job: BuildJob
      displayName: 'Build Docker Image and Push to ACR'

      steps:

        # Checkout source code
        - checkout: self
          displayName: 'Checkout Source Code'

        # Build Docker Image
        - task: Docker@2
          displayName: 'Build Docker Image'
          inputs:
            command: 'build'
            repository: '$(imageRepository)'
            dockerfile: '$(dockerfilePath)'
            containerRegistry: '$(dockerRegistryServiceConnection)'
            tags: |
              $(tag)
              latest
            arguments: '--no-cache'

        # Push Docker Image
        - task: Docker@2
          displayName: 'Push Docker Image to ACR'
          inputs:
            command: 'push'
            repository: '$(imageRepository)'
            containerRegistry: '$(dockerRegistryServiceConnection)'
            tags: |
              $(tag)
              latest

        # Display Build Information
        - script: |
            echo "=========================================="
            echo "Docker Image Built and Pushed Successfully"
            echo "=========================================="

            echo "Image Details:"
            echo "Registry: $(containerRegistry)"
            echo "Repository: $(imageRepository)"
            echo "Tag: $(tag)"

            echo ""
            echo "Full Image:"
            echo "$(containerRegistry)/$(imageRepository):$(tag)"
            echo ""
          displayName: 'Display Image Information'

#######################################
# STAGE 2: DEPLOY TO AZURE VM
#######################################
- stage: Deploy
  displayName: 'Deploy to Azure VM'
  dependsOn: BuildAndPush
  condition: succeeded()

  jobs:
    - deployment: DeployToVM
      displayName: 'Deploy Container on Azure VM'
      environment: 'production-vm'

      strategy:
        runOnce:
          deploy:

            steps:

              # SSH into VM and Deploy
              - task: SSH@0
                displayName: 'Deploy Docker Container on VM'

                inputs:
                  sshEndpoint: '$(sshServiceConnection)'
                  runOptions: 'inline'

                  inline: |
                    echo "===================================="
                    echo "Starting Deployment"
                    echo "===================================="

                    # Login to ACR
                    echo "Logging into Azure Container Registry..."

                    echo "$(ACR_PASSWORD)" | docker login $(containerRegistry) \
                    -u $(ACR_USERNAME) \
                    --password-stdin

                    # Stop Existing Container
                    echo "Stopping existing container..."

                    docker stop $(CONTAINER_NAME) || true
                    docker rm $(CONTAINER_NAME) || true

                    # Remove old image
                    echo "Removing old images..."

                    docker rmi $(containerRegistry)/$(imageRepository):$(tag) || true

                    # Pull Latest Image
                    echo "Pulling latest Docker image..."

                    docker pull $(containerRegistry)/$(imageRepository):$(tag)

                    # Run New Container
                    echo "Starting new container..."

                    docker run -d \
                      --name $(CONTAINER_NAME) \
                      --restart unless-stopped \
                      -p $(APP_PORT):$(APP_PORT) \
                      -e SPRING_PROFILES_ACTIVE=prod \
                      $(containerRegistry)/$(imageRepository):$(tag)

                    # Wait for app startup
                    echo "Waiting for application startup..."

                    sleep 15

                    # Check running containers
                    echo "===================================="
                    echo "Container Status"
                    echo "===================================="

                    docker ps -a

                    # Show logs
                    echo "===================================="
                    echo "Container Logs"
                    echo "===================================="

                    docker logs --tail 50 $(CONTAINER_NAME)

                    # Health Check
                    echo "===================================="
                    echo "Application Health Check"
                    echo "===================================="

                    curl -f http://localhost:$(APP_PORT)/actuator/health || echo "Health endpoint unavailable"

                    # Cleanup unused images
                    echo "Cleaning old Docker images..."

                    docker image prune -af

                    echo "===================================="
                    echo "Deployment Completed Successfully"
                    echo "===================================="

                  readyTimeout: '20000'

              # Display URL
              - script: |
                  echo "===================================="
                  echo "Application URL"
                  echo "===================================="

                  echo "http://$(vmIP):$(APP_PORT)"
                displayName: 'Display Application URL'
